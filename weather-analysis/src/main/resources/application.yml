server:
  port: 8080 # 项目端口

spring:
  # MySQL数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/weather_analysis?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: root # 你的MySQL用户名
    password: 123456 # 你的MySQL密码
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Redis配置（新版写法）
  data:
    redis:
      host: localhost
      port: 6379

# 天气API配置
weather:
  cities: 西安,北京,上海,广州